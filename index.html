<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Churri Dashboard · Genesis · KOBO Growth</title>
<style>
:root{
  --mauve:#A87CA0; --mauve-deep:#7E5476; --mauve-soft:#C9A8C4; --mauve-pale:#EFE3EE;
  --gold:#C9A45E; --gold-soft:#E6CF9E; --gold-pale:#F6EEDD;
  --rose:#E5A9BE; --sage:#9DB89C; --sage-pale:#E7EFE6;
  --bg:#F8F3F8; --card:#FFFFFF; --ink:#4A3A47; --ink-soft:#8A7A86; --line:#EEE3EC;
  --ok:#8BBF8B; --warn:#E0A85C; --bad:#D98B97; --info:#9DA8D4;
  --shadow:0 6px 22px rgba(126,84,118,.10); --shadow-sm:0 2px 8px rgba(126,84,118,.08);
  --r:18px; --r-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(168,124,160,.15)}
html{-webkit-text-size-adjust:100%}
body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-weight:700;color:var(--mauve-deep)}
a{color:var(--mauve)}
::selection{background:var(--mauve-soft);color:#fff}
button,input,select,textarea{font-family:inherit}
/* ===== LOGIN ===== */
.login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(150deg,#EFE3EE 0%,#F6EEDD 55%,#F3E1E8 100%);overflow:hidden}
.login::before,.login::after{content:'';position:absolute;border-radius:50%;filter:blur(2px);opacity:.5}
.login::before{width:280px;height:280px;background:radial-gradient(circle,var(--mauve-soft),transparent 70%);top:-60px;left:-60px}
.login::after{width:320px;height:320px;background:radial-gradient(circle,var(--gold-soft),transparent 70%);bottom:-80px;right:-70px}
.login-card{position:relative;z-index:2;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border:1px solid #fff;
  border-radius:28px;padding:38px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(126,84,118,.22)}
.login-mark{width:74px;height:74px;border-radius:22px;margin:0 auto 16px;background:linear-gradient(135deg,var(--mauve),var(--gold));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;font-weight:800;box-shadow:0 10px 26px rgba(168,124,160,.4)}
.login-card h1{font-size:30px;letter-spacing:.5px;background:linear-gradient(120deg,var(--mauve-deep),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-card .hi{color:var(--ink);font-size:14.5px;margin-top:10px;line-height:1.6}
.login-card .hi b{color:var(--mauve-deep)}
.login-num{display:flex;gap:10px;justify-content:center;margin:18px 0 6px}
.login-num .nb{background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px 14px;box-shadow:var(--shadow-sm)}
.login-num .nb .v{font-size:22px;font-weight:800;color:var(--gold)}
.login-num .nb .l{font-size:9.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px}
.login-form{margin-top:20px}
.login-form input{width:100%;border:1.5px solid var(--mauve-soft);border-radius:14px;padding:14px 16px;font-size:15px;text-align:center;color:var(--ink);background:#fff}
.login-form input:focus{outline:none;border-color:var(--mauve);box-shadow:0 0 0 4px var(--mauve-pale)}
.login-form button{width:100%;margin-top:12px;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--mauve),var(--mauve-deep));cursor:pointer;box-shadow:var(--shadow)}
.login-form button:active{transform:scale(.98)}
.login-err{color:var(--bad);font-size:13px;margin-top:10px;font-weight:600;min-height:18px}
.login-foot{margin-top:18px;font-size:12px;color:var(--ink-soft)}
.shake{animation:sh .4s}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.app.locked{display:none}
/* ===== MODAL ===== */
.modal-ov{position:fixed;inset:0;z-index:60;background:rgba(74,58,71,.45);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-ov.show{display:flex}
.modal-card{background:#fff;border-radius:22px;max-width:440px;width:100%;padding:24px;box-shadow:0 24px 60px rgba(126,84,118,.32);margin:24px 0 40px;animation:pop .2s}
@keyframes pop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-card h3{font-size:19px;margin-bottom:2px}
.modal-card .m-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
.m-field{display:block;margin-bottom:13px}
.m-field>span{display:block;font-size:12.5px;font-weight:600;color:var(--mauve-deep);margin-bottom:5px}
.m-in{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;font-size:15px;color:var(--ink);background:#fff;font-family:inherit;min-height:46px}
.m-in:focus{outline:none;border-color:var(--mauve);box-shadow:0 0 0 3px var(--mauve-pale)}
.m-in.err{border-color:var(--bad);box-shadow:0 0 0 3px #FBE7EA}
select.m-in{appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--mauve) 50%),linear-gradient(135deg,var(--mauve) 50%,transparent 50%);background-position:calc(100% - 18px) 20px,calc(100% - 13px) 20px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px}
textarea.m-in{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.modal-actions .btn{min-width:104px;justify-content:center}
.m-msg{font-size:15px;color:var(--ink);line-height:1.5}
/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:236px;background:linear-gradient(170deg,#fff 0%,#FBF5FB 100%);border-right:1px solid var(--line);position:fixed;height:100vh;display:flex;flex-direction:column;z-index:30;transition:transform .25s}
.brand{padding:20px 20px 14px}
.brand .logo{display:flex;align-items:center;gap:10px}
.brand .mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--mauve),var(--gold));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;box-shadow:var(--shadow-sm)}
.brand .name{font-weight:800;color:var(--mauve-deep);font-size:16px;letter-spacing:.3px}
.brand .sub{font-size:11px;color:var(--ink-soft);margin-top:2px;margin-left:50px}
.nav{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 12px 14px}
.nav::-webkit-scrollbar{width:6px}.nav::-webkit-scrollbar-thumb{background:var(--mauve-pale);border-radius:6px}
.nav .grp{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-soft);margin:16px 12px 6px;font-weight:700}
.nav button{width:100%;border:0;background:transparent;text-align:left;padding:11px 12px;border-radius:12px;color:var(--ink);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:.15s;font-weight:500;min-height:44px}
.nav button .ico{font-size:17px;width:22px;text-align:center}
.nav button:hover{background:var(--mauve-pale)}
.nav button.active{background:linear-gradient(135deg,var(--mauve),var(--mauve-soft));color:#fff;box-shadow:var(--shadow-sm);font-weight:600}
.nav button .badge{margin-left:auto;background:var(--rose);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.nav button.active .badge{background:rgba(255,255,255,.3)}
.logout{margin:4px 12px 16px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:12px;padding:10px;font-size:12.5px;cursor:pointer;font-weight:600}
.main{margin-left:236px;flex:1;min-width:0}
.topbar{position:sticky;top:0;background:rgba(248,243,248,.9);backdrop-filter:blur(10px);padding:14px 26px;display:flex;align-items:center;gap:12px;z-index:20;border-bottom:1px solid var(--line)}
.topbar h1{font-size:20px}
.topbar .greet{color:var(--ink-soft);font-size:13px;margin-left:auto}
.topbar .pill{background:var(--gold-pale);color:var(--gold);border:1px solid var(--gold-soft);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.menu-btn{display:none;border:0;background:var(--mauve-pale);color:var(--mauve-deep);width:42px;height:42px;border-radius:12px;font-size:20px;cursor:pointer}
.scrim{display:none;position:fixed;inset:0;background:rgba(74,58,71,.35);z-index:25}
.view{padding:22px 26px 70px;max-width:1240px}
/* ===== Cards & grids ===== */
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.g2{display:grid;gap:16px;grid-template-columns:repeat(2,1fr)}
.g3{display:grid;gap:16px;grid-template-columns:repeat(3,1fr)}
.g4{display:grid;gap:14px;grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.card.soft{background:linear-gradient(160deg,#fff,#FCF7FB)}
.section-title{display:flex;align-items:center;gap:10px;margin:24px 0 14px}
.section-title h2{font-size:17px}
.section-title .line{flex:1;height:1px;background:var(--line)}
/* Numerology banner */
.numero{position:relative;overflow:hidden;border-radius:var(--r);padding:20px 22px;color:#fff;
  background:linear-gradient(120deg,var(--mauve-deep),var(--mauve) 55%,var(--gold));box-shadow:var(--shadow)}
.numero .spark{position:absolute;opacity:.18;font-size:90px;right:10px;top:-14px}
.numero h3{color:#fff;font-size:15px;letter-spacing:.5px}
.numero .aff{font-size:16px;font-weight:600;margin-top:8px;max-width:640px;line-height:1.5}
.numero .nums{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.numero .nbx{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:13px;padding:8px 13px;backdrop-filter:blur(4px)}
.numero .nbx .v{font-size:20px;font-weight:800}
.numero .nbx .l{font-size:10px;opacity:.9;text-transform:uppercase;letter-spacing:.5px}
/* KPI */
.kpi{position:relative;overflow:hidden}
.kpi .lbl{font-size:12px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .num{font-size:30px;font-weight:800;color:var(--mauve-deep);margin-top:6px;line-height:1}
.kpi .meta{font-size:11.5px;margin-top:6px;color:var(--ink-soft)}
.kpi .meta b{color:var(--sage)}
.kpi .deco{position:absolute;right:-8px;top:-8px;font-size:52px;opacity:.08}
.kpi.g .num{color:var(--gold)}
.progress{height:7px;background:var(--mauve-pale);border-radius:6px;overflow:hidden;margin-top:9px}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--mauve),var(--gold));border-radius:6px}
/* buttons */
.btn{border:0;border-radius:12px;padding:10px 15px;font-size:13.5px;font-weight:600;cursor:pointer;background:var(--mauve);color:#fff;transition:.15s;display:inline-flex;align-items:center;gap:6px;min-height:40px}
.btn:active{transform:scale(.97)}
.btn:hover{filter:brightness(1.05)}
.btn.ghost{background:var(--mauve-pale);color:var(--mauve-deep)}
.btn.gold{background:var(--gold)}
.btn.danger{background:var(--bad)}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:10px;min-height:34px}
/* tables */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);padding:10px 12px;border-bottom:2px solid var(--line);font-weight:700;white-space:nowrap}
td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:active{background:var(--mauve-pale)}
td[contenteditable]{outline:none;border-radius:6px}
td[contenteditable]:focus{background:var(--gold-pale);box-shadow:inset 0 0 0 2px var(--gold-soft)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.tag.ok{background:#E7F2E7;color:#5E8A5E}.tag.warn{background:#FCF0DE;color:#B5862F}
.tag.bad{background:#FBE7EA;color:#B5566A}.tag.info{background:#E9ECF8;color:#5A66A8}
.tag.mauve{background:var(--mauve-pale);color:var(--mauve-deep)}.tag.gold{background:var(--gold-pale);color:var(--gold)}
.sel{border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;background:#fff;color:var(--ink);min-height:38px}
/* kanban */
.kanban{display:flex;gap:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:14px}
.col{min-width:230px;flex:1;background:var(--mauve-pale);border-radius:var(--r);padding:12px}
.col h4{font-size:12.5px;display:flex;align-items:center;gap:7px;margin-bottom:10px;color:var(--mauve-deep)}
.col h4 .dot{width:9px;height:9px;border-radius:50%}
.col h4 .ct{margin-left:auto;background:#fff;color:var(--ink-soft);border-radius:10px;font-size:10px;padding:1px 7px}
.lead{background:#fff;border-radius:12px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow-sm);border-left:3px solid var(--mauve)}
.lead .co{font-weight:700;font-size:13.5px;color:var(--mauve-deep)}
.lead .ct2{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
.lead .row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.lead .val{margin-left:auto;font-weight:700;color:var(--gold);font-size:12px}
.lead .nxt{font-size:11px;color:var(--ink-soft);margin-top:7px;border-top:1px dashed var(--line);padding-top:7px}
.lead .move{margin-top:8px;display:flex;gap:6px;align-items:center}
.lead .move select{flex:1;border:1px solid var(--line);border-radius:9px;padding:6px;font-size:11.5px;background:#FCF7FB;color:var(--mauve-deep);min-height:34px}
.lead .x{border:0;background:var(--mauve-pale);color:var(--mauve-deep);border-radius:8px;width:32px;height:32px;font-size:13px;cursor:pointer}
/* lists / todos */
.todo{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.todo:last-child{border:0}
.check{width:24px;height:24px;min-width:24px;border-radius:8px;border:2px solid var(--mauve-soft);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.15s;margin-top:1px}
.check.on{background:linear-gradient(135deg,var(--mauve),var(--gold));border-color:transparent}
.todo .t{flex:1;font-size:14px}
.todo.done .t{text-decoration:line-through;color:var(--ink-soft)}
.todo .when{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.todo .x{border:0;background:transparent;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:8px}
.muted{color:var(--ink-soft)}
.flex{display:flex;align-items:center;gap:10px}
.between{justify-content:space-between}
.wrap{flex-wrap:wrap}
textarea.note{width:100%;min-height:120px;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:14px;resize:vertical;color:var(--ink);background:#FCF9FC}
textarea.note:focus{outline:none;border-color:var(--mauve-soft);box-shadow:0 0 0 3px var(--mauve-pale)}
.input{border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-size:14px;color:var(--ink);background:#fff;min-height:42px}
.input:focus{outline:none;border-color:var(--mauve-soft);box-shadow:0 0 0 3px var(--mauve-pale)}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.bar-row .nm{width:150px;font-size:13px;font-weight:600}
.bar-row .track{flex:1;height:14px;background:var(--mauve-pale);border-radius:8px;overflow:hidden}
.bar-row .track > i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--mauve),var(--gold));transition:width .5s}
.bar-row .vv{width:110px;text-align:right;font-size:12px;color:var(--ink-soft);font-weight:600}
.chip{background:var(--mauve-pale);color:var(--mauve-deep);border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.empty{text-align:center;color:var(--ink-soft);padding:26px;font-size:13px}
.callout{background:var(--gold-pale);border:1px solid var(--gold-soft);border-radius:14px;padding:13px 16px;font-size:13.5px;color:#8a6d2f}
.callout b{color:var(--gold)}
.pk{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;white-space:nowrap}
.pk.sig{background:var(--mauve-pale);color:var(--mauve-deep)}
.pk.ess{background:var(--gold-pale);color:var(--gold)}
.mini-stat{text-align:center;padding:16px;background:#FCF7FB;border-radius:14px}
.mini-stat .n{font-size:25px;font-weight:800;color:var(--mauve-deep)}
.mini-stat .l{font-size:11px;color:var(--ink-soft);margin-top:3px}
.acc{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;background:#fff}
.acc summary{padding:15px 16px;font-weight:700;cursor:pointer;color:var(--mauve-deep);list-style:none;display:flex;align-items:center;gap:10px;min-height:48px}
.acc summary::-webkit-details-marker{display:none}
.acc summary::before{content:'▸';color:var(--mauve);transition:.2s}
.acc[open] summary::before{transform:rotate(90deg)}
.acc .body{padding:0 16px 16px;font-size:14px;color:var(--ink)}
.acc .body ul{margin-left:18px;margin-top:6px}
.acc .body li{margin-bottom:5px}
/* Tasks */
.quickadd{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow-sm)}
.quickadd input.input{flex:1;min-width:180px}
.whenchips{display:flex;gap:6px;flex-wrap:wrap}
.wchip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:20px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;min-height:36px}
.wchip.on{background:var(--mauve);color:#fff;border-color:transparent}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.tab{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;min-height:40px}
.tab.on{background:linear-gradient(135deg,var(--mauve),var(--mauve-soft));color:#fff;border-color:transparent}
.bucket{margin-top:18px}
.bucket h3{font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bucket h3 .ct{background:var(--mauve-pale);color:var(--mauve-deep);border-radius:10px;font-size:11px;padding:1px 8px}
.bucket.overdue h3{color:var(--bad)}
.task-cat{font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;margin-left:6px}
.task-cat.Tarea{background:var(--mauve-pale);color:var(--mauve-deep)}
.task-cat.Idea{background:var(--gold-pale);color:var(--gold)}
.task-cat.Aprender{background:#E9ECF8;color:#5A66A8}
.task-cat.Proyecto{background:var(--sage-pale);color:#5E8A5E}
/* Calendar */
.cal-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.cal-head h2{font-size:18px;text-transform:capitalize}
.cal-nav{border:0;background:var(--mauve-pale);color:var(--mauve-deep);width:40px;height:40px;border-radius:12px;font-size:18px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;padding-bottom:4px}
.cal-cell{background:#fff;border:1px solid var(--line);border-radius:12px;min-height:78px;padding:7px;cursor:pointer;transition:.12s;display:flex;flex-direction:column}
.cal-cell:active{background:var(--mauve-pale)}
.cal-cell.out{opacity:.35}
.cal-cell.today{border-color:var(--mauve);box-shadow:0 0 0 2px var(--mauve-pale)}
.cal-cell.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-pale)}
.cal-cell .dn{font-size:13px;font-weight:700;color:var(--ink)}
.cal-cell .dots{margin-top:auto;display:flex;gap:3px;flex-wrap:wrap}
.cal-cell .cdot{font-size:10px;font-weight:700;border-radius:6px;padding:1px 5px}
.cal-cell .cdot.t{background:var(--mauve-pale);color:var(--mauve-deep)}
.cal-cell .cdot.m{background:var(--gold-pale);color:var(--gold)}
/* Responsive */
@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){

/* ============ MODAL SYSTEM ============ */
let _modalSave=null;
function closeModal(){document.getElementById('modalOv').classList.remove('show');_modalSave=null;}
function modalDoSave(){if(_modalSave)_modalSave();}
window.closeModal=closeModal;window.modalDoSave=modalDoSave;
function openForm(opts){
  document.getElementById('modalTitle').textContent=opts.title||'';
  const sub=document.getElementById('modalSub');
  sub.textContent=opts.sub||''; sub.style.display=opts.sub?'block':'none';
  const saveBtn=document.getElementById('modalSave');
  saveBtn.textContent=opts.saveLabel||'Guardar';
  saveBtn.className='btn'+(opts.danger?' danger':'');
  const fields=opts.fields||[];
  document.getElementById('modalBody').innerHTML=fields.map(f=>{
    const id='mf_'+f.key; let input;
    if(f.type==='select'){
      input=`<select class="m-in" id="${id}">`+ (f.options||[]).map(o=>{const v=(typeof o==='object')?o.v:o;const l=(typeof o==='object')?o.l:o;const selV=(f.value!=null?f.value:(fields,''));return `<option value="${esc(v)}" ${String(v)===String(f.value!=null?f.value:'')?'selected':''}>${esc(l)}</option>`;}).join('') +`</select>`;
    } else if(f.type==='textarea'){
      input=`<textarea class="m-in" id="${id}" placeholder="${esc(f.placeholder||'')}">${esc(f.value!=null?f.value:'')}</textarea>`;
    } else {
      const enter=`onkeydown="if(event.key==='Enter')modalDoSave()"`;
      input=`<input class="m-in" id="${id}" type="${f.type||'text'}" value="${esc(f.value!=null?f.value:'')}" placeholder="${esc(f.placeholder||'')}" ${f.type==='number'?'inputmode="decimal"':''} ${enter}>`;
    }
    return `<label class="m-field"><span>${esc(f.label)}${f.required?' *':''}</span>${input}</label>`;
  }).join('');
  _modalSave=()=>{
    const vals={}; let bad=false;
    fields.forEach(f=>{const el=document.getElementById('mf_'+f.key); let v=el.value;
      if(f.required && !String(v).trim()){el.classList.add('err');bad=true;} else el.classList.remove('err');
      if(f.type==='number')v=num(v); else if(typeof v==='string')v=v.trim();
      vals[f.key]=v;});
    if(bad)return;
    opts.onSave(vals); closeModal();
  };
  document.getElementById('modalOv').classList.add('show');
  setTimeout(()=>{const first=document.querySelector('#modalBody .m-in');if(first){try{first.focus();}catch(e){}}},90);
}
function openConfirm(msg,onYes){
  document.getElementById('modalTitle').textContent='Confirmar';
  const sub=document.getElementById('modalSub'); sub.style.display='none';
  document.getElementById('modalBody').innerHTML=`<p class="m-msg">${esc(msg)}</p>`;
  const saveBtn=document.getElementById('modalSave'); saveBtn.textContent='Sí, eliminar'; saveBtn.className='btn danger';
  _modalSave=()=>{onYes();closeModal();};
  document.getElementById('modalOv').classList.add('show');
}

/* ============ METRICS ============ */
function metrics(){
  const ind=DB.industries.reduce((a,x)=>({emails:a.emails+num(x.emails),replies:a.replies+num(x.replies),meetings:a.meetings+num(x.meetings),leads:a.leads+num(x.leads)}),{emails:0,replies:0,meetings:0,leads:0});
  const won=DB.pipeline.filter(p=>p.stage==='won');
  const proposals=DB.pipeline.filter(p=>p.stage==='proposal');
  const activePipe=DB.pipeline.filter(p=>!['won','lost'].includes(p.stage));
  const inProcess=DB.pipeline.filter(p=>['responded','meeting','proposal'].includes(p.stage));
  const positives=DB.sequences.reduce((s,x)=>s+num(x.positive),0);
  const cpct=num(DB.meta.commissionPct)||10;
  const wonVal=won.reduce((s,p)=>s+num(p.val),0);
  const commission=Math.round(wonVal*cpct/100);
  const revenue=DB.clients.filter(c=>c.status==='Activo').reduce((s,c)=>s+num(c.amount),0);
  const pipelineValue=activePipe.reduce((s,p)=>s+num(p.val),0);
  const t=DB.tasks;
  return {
    emails:ind.emails, replies:ind.replies, indMeetings:ind.meetings, leads:ind.leads,
    positives, meetingsAll:DB.meetings.length, meetingsUp:DB.meetings.filter(m=>m.status==='upcoming').length, meetingsDone:DB.meetings.filter(m=>m.status==='done').length,
    won:won.length, wonVal, commission, revenue, pipelineValue,
    proposals:proposals.length, activePipe:activePipe.length, inProcess:inProcess.length,
    replyRate:ind.emails?Math.round(ind.replies/ind.emails*100):0,
    handoffs:DB.handoff.length, clients:DB.clients.filter(c=>c.status==='Activo').length,
    tasksDone:t.filter(x=>x.done).length, tasksOpen:t.filter(x=>!x.done).length,
    tasksOverdue:t.filter(x=>!x.done&&x.due&&diffDays(todayStr(),x.due)<0).length,
    tasksToday:t.filter(x=>x.due&&diffDays(todayStr(),x.due)===0),
    projects:t.filter(x=>x.cat==='Proyecto'&&!x.done).length,
  };
}

/* ============ TASKS ============ */
let taskFilter='Todas';
let qaWhen=0, qaCat='Tarea';
const BUCKETS=[
  {id:'overdue',name:'Atrasadas',ico:'⚠️',test:d=>d!==null&&d<0},
  {id:'today',name:'Hoy',ico:'⭐',test:d=>d===0},
  {id:'tomorrow',name:'Mañana',ico:'🌤️',test:d=>d===1},
  {id:'soon',name:'Próximos días',ico:'📅',test:d=>d>=2&&d<=3},
  {id:'week',name:'Esta semana',ico:'🗓️',test:d=>d>=4&&d<=7},
  {id:'later',name:'Más adelante',ico:'⏳',test:d=>d>7},
  {id:'someday',name:'Algún día',ico:'💭',test:d=>d===null},
];
function taskDelta(t){return t.due==null?null:diffDays(todayStr(),t.due);}
function viewToday(){
  const open=DB.tasks.filter(t=>!t.done);
  const done=DB.tasks.filter(t=>t.done);
  const cats=['Todas','Tarea','Proyecto','Idea','Aprender'];
  const filtered=open.filter(t=>taskFilter==='Todas'||t.cat===taskFilter);
  let body='';
  BUCKETS.forEach(b=>{
    const items=filtered.filter(t=>b.test(taskDelta(t)));
    if(!items.length && b.id!=='today')return;
    body+=`<div class="bucket ${b.id}"><h3>${b.ico} ${b.name} <span class="ct">${items.length}</span></h3><div class="card" style="margin-top:8px">`;
    body+= items.length?items.map(taskRow).join(''):'<div class="empty">Nada por aquí ✨</div>';
    body+=`</div></div>`;
  });
  const doneBlock=done.length?`<details class="acc" style="margin-top:20px"><summary>✓ Completadas (${done.length})</summary><div class="body">${done.map(taskRow).join('')}<button class="btn sm ghost" style="margin-top:10px" onclick="clearDone()">Limpiar completadas</button></div></details>`:'';
  const tabLabel=c=>c==='Todas'?'Todas':c==='Tarea'?'✓ Tareas':c==='Proyecto'?'📁 Proyectos':c==='Idea'?'💡 Ideas':'📚 Aprender';
  const whenOpts=[[0,'Hoy'],[1,'Mañana'],[3,'+3 días'],[7,'Semana'],[-1,'Sin fecha']];
  return `
  <div class="callout" style="margin-bottom:14px">✅ <b>Tu día, estilo To-Do.</b> Escribe, elige cuándo y el tipo, y agrega. Márcala lista al terminar. Todo se sincroniza con tus dashboards.</div>
  <div style="margin-bottom:6px"><button class="btn gold" onclick="addTaskModal()" style="font-size:15px;padding:13px 20px">✚ Nueva tarea</button></div>
  <div class="tabs">${cats.map(c=>`<button class="tab ${taskFilter===c?'on':''}" onclick="setFilter('${c}')">${tabLabel(c)}</button>`).join('')}</div>
  ${body}
  ${doneBlock}`;
}
function taskRow(t){
  const i=DB.tasks.indexOf(t);
  const delta=taskDelta(t);
  let when= t.due==null?'Sin fecha':delta===0?'Hoy':delta===1?'Mañana':delta===-1?'Ayer':delta<0?`Hace ${-delta} días`:`En ${delta} días · ${fmtDate(t.due)}`;
  return `<div class="todo ${t.done?'done':''}">
    <div class="check ${t.done?'on':''}" onclick="toggleTask(${i})">${t.done?'✓':''}</div>
    <div class="t">${esc(t.t)}<span class="task-cat ${t.cat}">${t.cat}</span><div class="when">${t.done?'Completada':'📌 '+when}</div></div>
    <button class="x" onclick="delTask(${i})">✕</button>
  </div>`;
}
window.setWhen=w=>{qaWhen=w;document.querySelectorAll('#qaWhen .wchip').forEach(c=>c.classList.toggle('on',+c.dataset.w===w));};
window.setCat=v=>{qaCat=v;};
window.setFilter=c=>{taskFilter=c;render();};
window.addTaskModal=()=>openForm({title:'Nueva tarea',sub:'Se agrega a Mis Tareas y al calendario',fields:[{key:'t',label:'¿Que hay que hacer?',required:true,type:'textarea',placeholder:'Tu tarea, idea o proyecto...'},{key:'cuando',label:'¿Cuando?',type:'select',options:[{v:'0',l:'Hoy'},{v:'1',l:'Manana'},{v:'3',l:'En 3 dias'},{v:'7',l:'Esta semana'},{v:'-1',l:'Sin fecha'}],value:'0'},{key:'cat',label:'Tipo',type:'select',options:['Tarea','Proyecto','Idea','Aprender'],value:'Tarea'}],onSave:v=>{const w=parseInt(v.cuando,10);const due=(isNaN(w)||w===-1)?null:addDays(w);DB.tasks.push({id:Date.now(),t:v.t,done:false,cat:v.cat,due});save();render();}});
let _lastAdd=0;window.addTask=()=>{const now=Date.now();if(now-_lastAdd<450)return;const el=$('#qaText');if(!el)return;const txt=el.value.trim();if(!txt)return;_lastAdd=now;const due=qaWhen===-1?null:addDays(qaWhen);DB.tasks.push({id:Date.now(),t:txt,done:false,cat:qaCat,due});save();render();};
window.toggleTask=i=>{DB.tasks[i].done=!DB.tasks[i].done;save();render();};
window.delTask=i=>{DB.tasks.splice(i,1);save();render();};
window.clearDone=()=>{DB.tasks=DB.tasks.filter(t=>!t.done);save();render();};

/* ============ CALENDAR ============ */
let calY, calM, calSel=null;
function initCal(){const d=new Date();calY=d.getFullYear();calM=d.getMonth();}
function viewCalendar(){
  if(calY===undefined)initCal();
  const first=new Date(calY,calM,1);
  let startDow=(first.getDay()+6)%7;
  const daysIn=new Date(calY,calM+1,0).getDate();
  const prevDays=new Date(calY,calM,0).getDate();
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push({d:prevDays-startDow+1+i,out:true});
  for(let d=1;d<=daysIn;d++)cells.push({d,out:false});
  while(cells.length%7)cells.push({d:cells.length-startDow-daysIn+1,out:true});
  const today=todayStr();
  const ds=d=>`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const grid=cells.map(c=>{
    if(c.out)return `<div class="cal-cell out"><div class="dn">${c.d}</div></div>`;
    const date=ds(c.d);
    const tc=DB.tasks.filter(t=>!t.done&&t.due===date).length;
    const mc=DB.meetings.filter(m=>m.date===date).length;
    const cls=`cal-cell${date===today?' today':''}${date===calSel?' sel':''}`;
    const dots=`${tc?`<span class="cdot t">${tc} ✓</span>`:''}${mc?`<span class="cdot m">${mc} 📅</span>`:''}`;
    return `<div class="${cls}" onclick="selDay('${date}')"><div class="dn">${c.d}</div><div class="dots">${dots}</div></div>`;
  }).join('');
  let detail='';
  if(calSel){
    const ts=DB.tasks.filter(t=>t.due===calSel);
    const ms=DB.meetings.filter(m=>m.date===calSel);
    detail=`<div class="card" style="margin-top:18px"><h3>📌 ${fmtDateLong(calSel)}</h3>
      ${ms.length?`<div style="margin-top:10px"><b style="color:var(--gold);font-size:13px">Reuniones</b>${ms.map(m=>`<div class="todo"><span>📅</span><div class="t"><b>${esc(m.co)}</b> · ${m.type}<div class="when">${m.time} · ${esc(m.contact)}</div></div></div>`).join('')}</div>`:''}
      ${ts.length?`<div style="margin-top:10px"><b style="color:var(--mauve-deep);font-size:13px">Tareas</b>${ts.map(t=>{const i=DB.tasks.indexOf(t);return `<div class="todo ${t.done?'done':''}"><div class="check ${t.done?'on':''}" onclick="toggleTask(${i})">${t.done?'✓':''}</div><div class="t">${esc(t.t)}<span class="task-cat ${t.cat}">${t.cat}</span></div></div>`;}).join('')}</div>`:''}
      ${!ms.length&&!ts.length?'<div class="empty">Día libre ✨ ¡a prospectar!</div>':''}
      <button class="btn sm ghost" style="margin-top:12px" onclick="addTaskOn('${calSel}')">+ Tarea este día</button>
    </div>`;
  }
  const prefix=`${calY}-${String(calM+1).padStart(2,'0')}`;
  const totT=DB.tasks.filter(t=>!t.done && t.due && t.due.startsWith(prefix)).length;
  const totM=DB.meetings.filter(m=>m.date.startsWith(prefix)).length;
  return `
  <div class="cal-head">
    <button class="cal-nav" onclick="calStep(-1)">‹</button>
    <h2>${MONTHS[calM]} ${calY}</h2>
    <button class="cal-nav" onclick="calStep(1)">›</button>
    <button class="btn sm ghost" onclick="calToday()">Hoy</button>
    <span class="chip" style="margin-left:auto">${totT} tareas · ${totM} reuniones</span>
  </div>
  <div class="cal-grid">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${grid}</div>
  ${detail}`;
}
function fmtDateLong(s){const d=new Date(s+'T00:00:00');if(isNaN(d.getTime()))return String(s);return `${DOW[(d.getDay()+6)%7]} ${d.getDate()} de ${MONTHS[d.getMonth()]}`;}
window.calStep=n=>{calM+=n;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}calSel=null;render();};
window.calToday=()=>{initCal();calSel=todayStr();render();};
window.selDay=d=>{calSel=calSel===d?null:d;render();};
window.addTaskOn=date=>openForm({title:'Nueva tarea',sub:fmtDateLong(date),fields:[
  {key:'t',label:'Tarea',required:true,type:'textarea',placeholder:'¿Qué hay que hacer?'},
  {key:'cat',label:'Tipo',type:'select',options:['Tarea','Proyecto','Idea','Aprender'],value:'Tarea'},
],onSave:v=>{DB.tasks.push({id:Date.now(),t:v.t,done:false,cat:v.cat,due:date});save();render();}});

function wirePipeline(){
  let dragId=null;
  document.querySelectorAll('.lead').forEach(el=>{
    el.addEventListener('dragstart',()=>{dragId=+el.dataset.id;el.style.opacity=.4;});
    el.addEventListener('dragend',()=>el.style.opacity=1);
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>e.preventDefault());
    col.addEventListener('drop',e=>{e.preventDefault();const lead=DB.pipeline.find(p=>p.id===dragId);if(lead){lead.stage=col.dataset.stage;save();render();}});
  });
}
window.moveLead=(id,stage)=>{const p=DB.pipeline.find(x=>x.id===id);if(p){p.stage=stage;save();render();}};

function viewGoals(){

  const rows=[['emails','Emails enviados','📧',M.emails],['replies','Respuestas','💬',M.replies],['meetings','Reuniones','📅',M.meetingsAll],['leads','Leads nuevos','✨',M.leads],['proposals','Propuestas','📄',M.proposals],['closes','Cierres','🏆',M.won]];
  return `
  <div class="callout">🎯 Tus números reales (izquierda, calculados solos desde tu app) vs tu meta (editable, toca para cambiar).</div>
  <div class="card" style="margin-top:16px">
    <h3>Progreso de la semana</h3>
    <div style="margin-top:16px">
    ${rows.map(([k,nm,ic,actual])=>`
      <div class="bar-row">
        <div class="nm">${ic} ${nm}</div>
        <div class="track"><i style="width:${pct(actual,t[k])}%"></i></div>
        <div class="vv"><b style="color:var(--mauve-deep)">${actual}</b> / <span contenteditable inputmode="numeric" oninput="updTarget('${k}',this)">${t[k]}</span></div>
      </div>`).join('')}
    </div>
  </div>
  <div class="g2" style="margin-top:18px">
    <div class="card kpi g"><div class="deco">👑</div><div class="lbl">Comisión ganada (10%)</div><div class="num">${money(M.commission)}</div><div class="meta">Automática: 10% de ${money(M.wonVal)} en deals ganados</div></div>
    <div class="card">
      <h3>📈 Conversión del embudo</h3>
      <div style="margin-top:12px">
        ${funnelRow('Emails → Respuestas',pct(M.replies,M.emails))}
        ${funnelRow('Respuestas → Reuniones',pct(M.meetingsAll,M.replies))}
        ${funnelRow('Reuniones → Propuestas',pct(M.proposals,M.meetingsAll))}
        ${funnelRow('Propuestas → Cierres',pct(M.won,M.proposals))}
      </div>
    </div>
  </div>`;
}
function funnelRow(nm,p){return `<div class="bar-row"><div class="nm" style="width:175px;font-size:12px">${nm}</div><div class="track"><i style="width:${p}%"></i></div><div class="vv">${p}%</div></div>`;}

/* ============ INIT ============ */
function startApp(){
  initCal();
  const h=new Date().getHours();
  $('#greet').textContent=(h<12?'Buenos días':h<19?'Buenas tardes':'Buenas noches')+', Genesis ✿';
  const now=new Date();const oneJan=new Date(now.getFullYear(),0,1);const wk=Math.ceil((((now-oneJan)/86400000)+oneJan.getDay()+1)/7);
  $('#weekPill').textContent='Semana '+wk;
  current='home';$('#pageTitle').textContent=TITLES.home;
  buildNav();render();
}
function boot(){
  buildLogin();
  let authed=false; try{authed=localStorage.getItem(AUTH_KEY)==='1';}catch(e){}
  if(authed){
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.remove('locked');
    startApp();
  }else{
    const p=document.getElementById('pwd'); if(p) setTimeout(()=>{try{p.focus();}catch(e){}},150);
  }
}
boot();
</script>
